services:
  # ── Backend ─────────────────────────────────────────────────────────────
  - type: web
    name: tempmail-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          name: tempmail-frontend
          type: static
          property: host

  # ── Frontend (static site) ───────────────────────────────────────────────
  - type: static
    name: tempmail-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: tempmail-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
