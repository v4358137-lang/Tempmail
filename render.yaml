services:
  # ── Unified TempMail Service ────────────────────────────────────────────
  - type: web
    name: tempmail
    runtime: node
    plan: free
    buildCommand: |
      # 1. Install and build frontend
      cd frontend && npm install && npm run build
      # 2. Move build to backend folder
      cd ..
      rm -rf backend/dist && cp -r frontend/dist backend/dist
      # 3. Install backend dependencies
      cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: "" # Empty means use relative path (current host)
