services:
  # ── Backend (Web Service) ───────────────────────────────────────────────
  - type: web
    name: tempmail-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production

  # ── Frontend (Static Site) ───────────────────────────────────────────────
  - type: static
    name: tempmail-frontend
    # Note: Removing rootDir to avoid path confusion on static sites
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://tempmail-backend-7taa.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
