services:
  # ── Backend ─────────────────────────────────────────────────────────────
  - type: web
    name: tempmail-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          name: tempmail-frontend
          type: web
          property: host

  # ── Frontend (now a web service to fix the loop) ───────────────────────
  - type: web
    name: tempmail-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: VITE_API_URL
        fromService:
          name: tempmail-backend
          type: web
          property: host
